<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <title>Dynamics 365 Chat Widget</title>
    <style>
        /* Modern CSS Reset and Variables */
        :root {
            --primary-color: #195588;
            --bg-color: #f4f7f9;
            --text-color: #333333;
            --card-bg: #ffffff;
        }

        body {
            /* Modern system fonts for a clean look */
            font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Card styling for the welcome text */
        .welcome-card {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            text-align: center;
            max-width: 450px;
            width: 90%;
        }

        h1 {
            color: var(--primary-color);
            margin-top: 0;
            font-size: 28px;
            font-weight: 600;
        }

        p {
            font-size: 16px;
            color: #555555;
            line-height: 1.6;
            margin-bottom: 0;
        }
    </style>
</head>
